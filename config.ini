# Конфигурация приложения. Бэкенд базы данных переключается здесь.
[database]
# backend: sqlite (по умолчанию) или postgres
backend = sqlite

# --- настройки для backend = sqlite ---
sqlite_path = guestbook.db

# --- настройки для backend = postgres ---
# Хост db:5432 соответствует сервису db из .devcontainer/docker-compose.yml.
# В реальном проекте пароль НЕ коммитят — его берут из переменной окружения
# DATABASE_URL (она переопределяет это значение). См. POSTGRES.md.
postgres_dsn = postgresql://postgres:postgres@db:5432/guestbook
