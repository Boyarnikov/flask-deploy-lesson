<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Гостевая книга</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.5rem; }
    form { display: grid; gap: 8px; margin-bottom: 24px; }
    input, textarea { padding: 8px; font: inherit; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; font: inherit; cursor: pointer; border: 0; border-radius: 6px; background: #2d6cdf; color: #fff; }
    .entry { border-top: 1px solid #ddd; padding: 12px 0; }
    .meta { color: #888; font-size: 0.85rem; }
    .empty { color: #888; }
  </style>
</head>
<body>
  <h1>📖 Гостевая книга</h1>

  <form action="{{ url_for('add') }}" method="post">
    <input name="name" placeholder="Ваше имя" maxlength="50">
    <textarea name="message" placeholder="Сообщение" rows="3" required></textarea>
    <button type="submit">Оставить запись</button>
  </form>

  {% for e in entries %}
    <div class="entry">
      <strong>{{ e["name"] }}</strong>
      <span class="meta">{{ e["created_at"] }}</span>
      <p>{{ e["message"] }}</p>
    </div>
  {% else %}
    <p class="empty">Пока пусто. Будьте первым!</p>
  {% endfor %}
</body>
</html>
