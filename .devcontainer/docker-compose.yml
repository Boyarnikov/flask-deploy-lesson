# Dev-контейнер для Codespaces: рядом с приложением (app) поднимается
# отдельный контейнер с PostgreSQL (db). Приложение видит его по хосту "db".
#
# Для backend = sqlite этот файл не обязателен, но не мешает: контейнер с
# Postgres просто будет работать вхолостую.

services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3.12-bookworm
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guestbook
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
